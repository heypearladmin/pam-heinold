  <text x="60" y="200" text-anchor="middle" class="sans" fill="#F5F1EC" font-size="38">ERA</text>
  <text x="60" y="232" text-anchor="middle" class="sans" fill="#F5F1EC" font-size="14" opacity="0.85">REAL ESTATE</text>
  <text x="200" y="160" class="display" fill="#F5F1EC" font-size="86" font-weight="700">AMERICAN</text>
