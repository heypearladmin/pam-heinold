<?xml version="1.0" encoding="UTF-8"?>
<!-- Light variant for the dark footer. Replace with the official light ERA logo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="ERA American Real Estate">
  <style>
    .display { font-family: 'Vidaloka', 'Playfair Display', serif; }
